    <!-- chimney -->
    <rect x="50" y="14" width="20" height="16" rx="3"/>
    <!-- furnace body (stepped) -->
    <path d="M34 104 L34 58 Q34 46 44 40 L52 32 L68 32 L76 40 Q86 46 86 58 L86 104 Z"/>
    <!-- base -->
