    <!-- smile + eyes -->
    <circle cx="52" cy="52" r="2.4" fill="#0F2A5C" stroke="none"/>
    <circle cx="68" cy="52" r="2.4" fill="#0F2A5C" stroke="none"/>
    <path d="M52 60 Q60 66 68 60" stroke="#0F2A5C" stroke-width="3.2" fill="none"/>
